<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пузырчатая плёнка — Островок тишины</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #2d1b3d, #3d2b4f);
            color: #e0d0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 {
            margin: 20px 0 10px;
            font-size: 1.8em;
            color: #e8d5f5;
        }

        .counter {
            margin-bottom: 15px;
            font-size: 1.1em;
            color: #b09ad4;
        }

        .bubble-grid {
            display: grid;
            grid-template-columns: repeat(5, 60px);
            gap: 8px;
            justify-content: center;
            margin: 10px auto 30px;
        }

        .bubble {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #d4b8f0, #9b7ec4, #6b4e8a);
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3), inset 0 -2px 5px rgba(0,0,0,0.2);
            position: relative;
        }

        .bubble::after {
            content: '';
            position: absolute;
            top: 12px;
            left: 14px;
            width: 15px;
            height: 10px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: rotate(-20deg);
        }

        .bubble:hover {
            transform: scale(1.1);
        }

        .bubble.popped {
            animation: pop 0.2s ease-out forwards;
            pointer-events: none;
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        .btn {
            background: #7b5ea7;
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn:hover {
            background: #9b7ec4;
            transform: scale(1.05);
        }

        .btn-small {
            background: #4a305e;
            color: #e0d0f0;
            border: 1px solid #7b5ea7;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-small:hover {
            background: #5d3f7a;
        }

        .confetti {
            position: fixed;
            pointer-events: none;
            font-size: 1.5em;
            animation: confettiFall 1.5s ease-out forwards;
            z-index: 100;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 400px) {
            .bubble-grid {
                grid-template-columns: repeat(5, 50px);
                gap: 6px;
            }
            .bubble {
                width: 50px;
                height: 50px;
            }
            .bubble::after {
                top: 10px;
                left: 12px;
                width: 12px;
                height: 8px;
            }
        }
    </style>
</head>
<body>

    <h1>Пузырчатая плёнка</h1>
    <p class="counter">Осталось: <span id="bubble-count">35</span></p>

    <div class="bubble-grid" id="bubble-grid"></div>

    <button class="btn" onclick="resetBubbles()">Заново</button>
    <br>
    <a href="index.html" class="btn-small">← Назад на островок</a>

    <!-- Звук -->
    <audio id="pop-sound-1" preload="auto">
        <source src="sounds/pop1.mp3" type="audio/mpeg">
    </audio>
    <audio id="pop-sound-2" preload="auto">
        <source src="sounds/pop2.mp3" type="audio/mpeg">
    </audio>
    <audio id="pop-sound-3" preload="auto">
        <source src="sounds/pop3.mp3" type="audio/mpeg">
    </audio>
    <audio id="pop-sound-4" preload="auto">
        <source src="sounds/pop4.mp3" type="audio/mpeg">
    </audio>
    <audio id="pop-sound-5" preload="auto">
        <source src="sounds/pop5.mp3" type="audio/mpeg">
    </audio>

    <script>
        const totalBubbles = 35; // 5 рядов по 7
        let popped = 0;
        const grid = document.getElementById('bubble-grid');
        const counter = document.getElementById('bubble-count');
                // Массив всех звуков
        const popSounds = [
            document.getElementById('pop-sound-1'),
            document.getElementById('pop-sound-2'),
            document.getElementById('pop-sound-3'),
            document.getElementById('pop-sound-4'),
            document.getElementById('pop-sound-5')];
        // Эмодзи-конфетти
        const confettiEmojis = ['🌸', '✨', '🫧', '💜', '🌙', '⭐', '💤'];

        function createBubbles() {
            grid.innerHTML = '';
            popped = 0;
            counter.textContent = totalBubbles;
            for (let i = 0; i < totalBubbles; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.addEventListener('click', function() {
                    popBubble(bubble);
                });
                // Для телефона — touch событие
                bubble.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    popBubble(bubble);
                });
                grid.appendChild(bubble);
            }
        }

        function popBubble(bubble) {
            if (bubble.classList.contains('popped')) return;

            // Звук
            const randomSound = popSounds[Math.floor(Math.random() * popSounds.length)];
            randomSound.currentTime = 0;
            randomSound.play().catch(() => {});

            // Анимация
            bubble.classList.add('popped');

            // Конфетти
            const rect = bubble.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top;
            spawnConfetti(x, y);

            // Счётчик
            popped++;
            counter.textContent = totalBubbles - popped;

            // Если все лопнуты
            if (popped >= totalBubbles) {
                setTimeout(() => {
                    spawnConfetti(window.innerWidth/2, window.innerHeight/2, 15);
                    setTimeout(() => {
                        if (confirm('Ты лопнула все пузырьки! Хочешь заново?')) {
                            resetBubbles();
                        }
                    }, 300);
                }, 300);
            }
        }

        function spawnConfetti(x, y, count = 3) {
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.textContent = confettiEmojis[Math.floor(Math.random() * confettiEmojis.length)];
                el.style.left = (x + (Math.random() - 0.5) * 60) + 'px';
                el.style.top = (y + Math.random() * 20) + 'px';
                el.style.animationDuration = (1 + Math.random() * 1) + 's';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 2000);
            }
        }

        function resetBubbles() {
            createBubbles();
        }

        // Старт
        createBubbles();
    </script>

</body>
</html>
